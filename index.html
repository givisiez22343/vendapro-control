<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Up Enterprise 6.0</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#141e30,#243b55);
color:#fff;
}

/* LOGIN */

#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(20px);
width:320px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.logo{
font-size:28px;
font-weight:700;
margin-bottom:10px;
background:linear-gradient(90deg,#00ffcc,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
background:#00ff88;
font-weight:600;
cursor:pointer;
}

/* APP */

#app{
display:none;
height:100vh;
display:flex;
}

.sidebar{
width:220px;
background:#0f172a;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
font-size:18px;
}

.sidebar button{
background:none;
color:#fff;
text-align:left;
margin-bottom:10px;
}

.content{
flex:1;
padding:30px;
overflow-y:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card h3{
font-size:14px;
opacity:0.7;
}

.card p{
font-size:24px;
font-weight:600;
margin-top:5px;
}

.green{color:#00ff88}
.red{color:#ff4d4d}

canvas{
margin-top:20px;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<div class="logo">UP ENTERPRISE</div>
<p>Faça login para continuar</p>
<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">
<div class="sidebar">
<h2>Menu</h2>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('relatorio')">Relatórios</button>
<button onclick="logout()">Sair</button>
</div>

<div class="content">

<div id="dashboard" class="screen">
<div class="card">
<h3>Faturamento</h3>
<p id="fat" class="green"></p>
</div>

<div class="card">
<h3>Lucro</h3>
<p id="lucro"></p>
</div>

<div class="card">
<h3>Margem de Lucro</h3>
<p id="margem"></p>
</div>

<canvas id="grafico" height="120"></canvas>
</div>

<div id="financeiro" class="screen" style="display:none">
<div class="card">
<h3>Resumo Financeiro</h3>
<p>Sistema preparado para expansão.</p>
</div>
</div>

<div id="relatorio" class="screen" style="display:none">
<div class="card">
<h3>Relatórios Inteligentes</h3>
<p>Versão 7.0 incluirá exportação PDF.</p>
</div>
</div>

</div>
</div>

<script>

let faturamento=45000;
let lucro=12000;

function entrar(){
if(user.value==="admin" && pass.value==="123"){
login.style.display="none";
app.style.display="flex";
atualizar();
}else{
alert("Usuário ou senha incorretos");
}
}

function logout(){
location.reload();
}

function mostrar(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function atualizar(){
fat.innerText="R$ "+faturamento.toFixed(2);
lucro > 0 ? lucroEl = lucro : lucroEl = lucro;
document.getElementById("lucro").innerText="R$ "+lucro.toFixed(2);
let margem=(lucro/faturamento)*100;
margem > 20 ?
document.getElementById("margem").className="green":
document.getElementById("margem").className="red";
document.getElementById("margem").innerText=margem.toFixed(1)+"%";

let ctx=document.getElementById("grafico").getContext("2d");
ctx.fillStyle="#00ff88";
ctx.fillRect(10,100,40,-(faturamento/500));
ctx.fillRect(80,100,40,-(lucro/100));
}

</script>

</body>
</html>
