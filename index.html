<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UP COMPUTER 5.0</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
}

header{
text-align:center;
padding:30px 20px;
}

.logo{
font-size:28px;
font-weight:700;
letter-spacing:2px;
background:linear-gradient(90deg,#00ffcc,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #00ff88;}
to{text-shadow:0 0 25px #00ffcc;}
}

.subtitle{
font-size:13px;
opacity:0.7;
}

.container{
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.title{
font-size:12px;
opacity:.7;
margin-bottom:5px;
}

.value{
font-size:24px;
font-weight:600;
}

.green{color:#00ff88}
.yellow{color:#ffc107}
.red{color:#ff4d4d}

.meta-bar{
height:10px;
background:#1f2a35;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.meta-progress{
height:100%;
background:linear-gradient(90deg,#00ff88,#00c853);
transition:width .6s;
}

.health{
margin-top:8px;
font-weight:600;
}

footer{
text-align:center;
padding:20px;
opacity:.5;
font-size:12px;
}

canvas{
margin-top:15px;
}

</style>
</head>
<body>

<header>
<div class="logo">UP COMPUTER</div>
<div class="subtitle">Enterprise Dashboard 5.0</div>
</header>

<div class="container">

<div class="card">
<div class="title">FATURAMENTO TOTAL</div>
<div id="fat" class="value"></div>
</div>

<div class="card">
<div class="title">LUCRO LÍQUIDO</div>
<div id="luc" class="value"></div>
</div>

<div class="card">
<div class="title">MARGEM DE LUCRO</div>
<div id="margem" class="value"></div>
</div>

<div class="card">
<div class="title">MARGEM DE CONTRIBUIÇÃO</div>
<div id="contrib" class="value"></div>
</div>

<div class="card">
<div class="title">META MENSAL</div>
<div id="metaTexto"></div>
<div class="meta-bar"><div id="metaBar" class="meta-progress"></div></div>
</div>

<div class="card">
<div class="title">SAÚDE FINANCEIRA</div>
<div id="health" class="health"></div>
</div>

<div class="card">
<div class="title">GRÁFICO DE FATURAMENTO</div>
<canvas id="grafico" height="150"></canvas>
</div>

</div>

<footer>
UP COMPUTER © 2026
</footer>

<script>

let meta = JSON.parse(localStorage.getItem("meta")) || 30000;
let vendas = JSON.parse(localStorage.getItem("vendas")) || [];
let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

function atualizar(){

let faturamento=0;
let lucroBruto=0;

vendas.forEach(v=>{
faturamento+=v.total;
lucroBruto+=v.lucro;
});

let despTotal=0;
despesas.forEach(d=>despTotal+=d.valor);

let lucroLiquido=lucroBruto-despTotal;

let margemLucro=faturamento?((lucroLiquido/faturamento)*100):0;
let margemContrib=faturamento?((lucroBruto/faturamento)*100):0;

fat.innerText="R$ "+faturamento.toFixed(2);
luc.innerText="R$ "+lucroLiquido.toFixed(2);
margem.innerText=margemLucro.toFixed(1)+"%";
contrib.innerText=margemContrib.toFixed(1)+"%";

let perc=(faturamento/meta)*100;
metaTexto.innerText=perc.toFixed(0)+"% da meta de R$ "+meta;
metaBar.style.width=(perc>100?100:perc)+"%";

let healthText="";
let healthColor="green";

if(margemLucro>25){
healthText="Empresa Saudável 🚀";
healthColor="green";
}else if(margemLucro>10){
healthText="Atenção Estratégica ⚠";
healthColor="yellow";
}else{
healthText="Risco Financeiro 🔴";
healthColor="red";
}

health.innerText=healthText;
health.className="health "+healthColor;

desenharGrafico();
}

function desenharGrafico(){
let ctx=document.getElementById("grafico").getContext("2d");
ctx.clearRect(0,0,400,200);

let meses=new Array(12).fill(0);
vendas.forEach(v=>meses[v.data]+=v.total);

let max=Math.max(...meses,10);

meses.forEach((v,i)=>{
let h=(v/max)*120;
ctx.fillStyle="#00ff88";
ctx.fillRect(i*30,150-h,20,h);
});
}

atualizar();

</script>

</body>
</html>
